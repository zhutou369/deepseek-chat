<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480" role="img" aria-label="DeepSeek web chat interface">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="100%" stop-color="#f0f9ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0066cc"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="640" height="480" rx="24" fill="url(#bg)"/>
  <rect x="48" y="40" width="544" height="400" rx="16" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="48" y="40" width="544" height="56" rx="16" fill="url(#accent)"/>
  <rect x="48" y="80" width="544" height="16" fill="url(#accent)"/>
  <circle cx="80" cy="68" r="8" fill="#ffffff" opacity="0.9"/>
  <circle cx="104" cy="68" r="8" fill="#ffffff" opacity="0.6"/>
  <circle cx="128" cy="68" r="8" fill="#ffffff" opacity="0.4"/>
  <text x="320" y="74" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="16" font-weight="600" fill="#ffffff">chat.deepseek.com</text>
  <rect x="72" y="120" width="280" height="56" rx="12" fill="#f1f5f9"/>
  <text x="92" y="144" font-family="Segoe UI,sans-serif" font-size="13" fill="#64748b">Rewrite this FAQ into 5 questions</text>
  <text x="92" y="164" font-family="Segoe UI,sans-serif" font-size="13" fill="#94a3b8">Max 60 words per answer</text>
  <rect x="288" y="200" width="280" height="120" rx="12" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="308" y="228" font-family="Segoe UI,sans-serif" font-size="13" font-weight="600" fill="#1e40af">DeepSeek</text>
  <text x="308" y="252" font-family="Segoe UI,sans-serif" font-size="12" fill="#334155">## What is included?</text>
  <text x="308" y="272" font-family="Segoe UI,sans-serif" font-size="12" fill="#475569">Login at chat.deepseek.com first</text>
  <text x="308" y="292" font-family="Segoe UI,sans-serif" font-size="12" fill="#475569">## How to export chat?</text>
  <rect x="72" y="360" width="496" height="48" rx="24" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="96" y="390" font-family="Segoe UI,sans-serif" font-size="13" fill="#94a3b8">Type your message...</text>
  <circle cx="544" cy="384" r="20" fill="url(#accent)"/>
  <path d="M536 384 L552 384 M544 376 L544 392" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
</svg>
